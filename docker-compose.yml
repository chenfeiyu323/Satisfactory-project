services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: satisfactory_factory_designer
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  backend:
    build:
      context: ./satisfactory-factory-designer-backend
    environment:
      DB_URL: jdbc:mysql://mysql:3306/satisfactory_factory_designer?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: password
      APP_CORS_ALLOWED_ORIGINS: http://localhost:4200,http://127.0.0.1:4200,http://localhost:80,http://127.0.0.1:80
      PORT: 8080
    ports:
      - "8080:8080"
    depends_on:
      - mysql

  frontend:
    build:
      context: ./satisfactory-factory-designer-frontend-angular-canvas
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  mysql_data:
