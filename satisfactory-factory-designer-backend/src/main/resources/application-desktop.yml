spring:
  datasource:
    url: jdbc:h2:file:./data/satisfactory-factory-designer;MODE=MySQL;DATABASE_TO_UPPER=false;AUTO_SERVER=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: sa

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    locations: classpath:db/migration

server:
  port: 8080

app:
  cors:
    allowed-origins: http://127.0.0.1:8080,http://localhost:8080
  sync:
    auto-import-on-startup: true
    overwrite-on-import: true
    save-file-path: ./shared/satisfactory-save.json
